<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morse Vampire</title>

  ✅ QUESTO È IL FIX
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <div class="top">
    <div class="bar">
      <div id="progress"></div>
    </div>
    <div id="time">Pronto</div>
  </div>

  <button id="startBtn">
    <div class="waves"></div>

    <svg viewBox="0 0 300 200" class="mouth">
      <path d="M20 100 C50 20, 250 20, 280 100 C250 80, 200 70, 150 70 C100 70, 50 80, 20 100 Z"
        fill="#c4002b"/>
      <path d="M20 100 C50 180, 250 180, 280 100 C250 120, 200 130, 150 130 C100 130, 50 120, 20 100 Z"
        fill="#600015"/>

      <ellipse id="mouthInner" cx="150" cy="100" rx="90" ry="30" fill="#120002"/>
      <ellipse cx="150" cy="115" rx="40" ry="15" fill="#ff4d7a"/>

      <!-- zanne -->
      <polygon id="fangL" points="120,70 135,70 127,105" fill="white"/>
      <polygon id="fangR" points="165,70 180,70 173,105" fill="white"/>
    </svg>
  </button>

  <div id="status">Premi per iniziare</div>
  <div id="sub">Microfono necessario</div>

  <div class="panel">
    <div>Sequenza: <span id="seq">—</span></div>
    <div>Durata: <span id="dur">0</span> ms</div>
    <div>Livello: <span id="lvl">0</span></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
